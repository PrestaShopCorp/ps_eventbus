services:
  prestashop:
    image: ${DOCKER_IMAGE_PRESTASHOP:?See e2e-env/.env.dist}
    container_name: prestashop
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PS_EVENTBUS_VERSION=$PS_EVENTBUS_VERSION
      - PS_ACCOUNTS_MOCK_VERSION=$PS_ACCOUNTS_MOCK_VERSION
      - GITHUB_API_TOKEN=$GITHUB_API_TOKEN
      - DEBUG_MODE=true
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./init-scripts:/tmp/init-scripts:ro
      - ./downloads:/downloads:rw
    ports:
      - ${HOST_PORT_BIND_PRESTASHOP:?See e2e-env/.env.dist}:80
    networks:
      prestashop:

  mysql:
    image: mariadb:${DOCKER_VERSION_MARIADB:?See e2e-env/.env.dist}
    container_name: mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '--host=localhost',
          '--user=prestashop',
          '--password=prestashop',
        ]
      interval: 1s
      timeout: 10s
      retries: 30
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=prestashop
      - MYSQL_PASSWORD=prestashop
      - MYSQL_ROOT_PASSWORD=prestashop
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=prestashop
    ports:
      - ${HOST_PORT_BIND_MYSQL:?See e2e-env/.env.dist}:3306
    networks:
      - prestashop

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - ${HOST_PORT_BIND_PHP_MY_ADMIN:?See e2e-env/.env.dist}:80
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=prestashop
      - PMA_PASSWORD=prestashop
      - MYSQL_ROOT_PASSWORD=prestashop
    networks:
      - prestashop

  cloudsync-mock:
    container_name: cloudsync-mock
    build:
      context: ./cloudsync-mock
      dockerfile: Dockerfile
    environment:
      - RUN_IN_DOCKER=1
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '-sI',
          'http://localhost:8080',
        ]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - ./cloudsync-mock/src:/home/node/src:ro
    ports:
      - ${SYNC_API_PORT:?See e2e-env/.env.dist}:3232
      - ${COLLECTOR_API_PORT:?See e2e-env/.env.dist}:3333
      - ${LIVE_SYNC_API_PORT:?See e2e-env/.env.dist}:3434
      - ${WS_PORT:?See e2e-env/.env.dist}:8080
    networks:
      - prestashop

  reverse-proxy:
    image: nginx:stable-alpine
    container_name: reverse-proxy
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '-sI',
          'http://localhost:80/nginx_status',
        ]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 1s
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,cached
    command: [ nginx-debug, "-g", "daemon off;" ]
    networks:
      - prestashop
    ports:
      - ${HOST_PORT_BIND_CLOUDSYNC_REVERSE_PROXY:?See e2e-env/.env.dist}:80

networks:
  prestashop:
    driver: bridge
